services:
  - type: web
    name: smart-road-gis-api
    env: node
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://smart-road-gis.vercel.app
      - key: DB_PATH
        value: /var/data/smartroad.db
      - key: UPLOAD_DIR
        value: /var/data/uploads
    disk:
      name: smart-road-data
      mountPath: /var/data
      sizeGB: 1
